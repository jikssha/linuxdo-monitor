{% extends "base.html" %}
{% set hide_nav = true %}
{% block title %}登录 - Linux.do Monitor{% endblock %}

{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="bi bi-shield-lock"></i>
            </div>
            <div class="eyebrow">
                <i class="bi bi-stars"></i> Secure Console Access
            </div>
            <h1 class="auth-title">进入监控控制台</h1>
            <p class="auth-subtitle">
                登录后你可以统一管理论坛配置、SQL 查询、用户统计和运行状态。
            </p>
        </div>
        <div class="card-body pt-0 px-4 pb-4">
            <form method="post" class="section-grid">
                <div>
                    <label for="password" class="label-inline">
                        <i class="bi bi-key"></i> 管理密码
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="请输入管理密码"
                            autofocus
                            required
                        >
                    </div>
                    <div class="form-text">
                        首次启动后可在 <code>data/config.json</code> 中找到自动生成的 Web 管理密码。
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> 登录控制台
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
