# 本地开发和测试用
version: '3.8'

services:
  linuxdo-monitor:
    build: .
    container_name: linuxdo-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_DIR=/data
      # 可选：通过环境变量配置
      # - TELEGRAM_BOT_TOKEN=your_bot_token
      # - ADMIN_CHAT_IDS=123456789
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
