services:
  linuxdo-monitor:
    image: ${IMAGE_NAME:-ghcr.io/jikssha/linuxdo-monitor}:${IMAGE_TAG:-latest}
    container_name: linuxdo-monitor
    restart: unless-stopped
    ports:
      - "${WEB_BIND_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      PYTHONUNBUFFERED: "1"
      CONFIG_DIR: /data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
