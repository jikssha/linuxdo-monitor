name: Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "python-telegram-bot>=20.0" \
            "feedparser>=6.0" \
            "apscheduler>=3.10" \
            "pydantic>=2.0" \
            "click>=8.0" \
            "flask>=3.0" \
            "requests>=2.30" \
            "curl_cffi>=0.6.0"

      - name: Compile source tree
        run: python -m compileall src

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Check CLI help
        run: |
          python -m linuxdo_monitor --help
          python -m linuxdo_monitor run --help
